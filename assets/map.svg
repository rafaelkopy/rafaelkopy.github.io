<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" width="1600" height="1000">
  <defs>
    <!-- Street glow effect -->
    <filter id="streetGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Marker pulse glow -->
    <filter id="markerGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle noise texture -->
    <filter id="noise">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.04"/>
      </feComponentTransfer>
      <feBlend in="SourceGraphic" mode="overlay"/>
    </filter>
    <!-- Water pattern -->
    <pattern id="waterPattern" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <rect width="20" height="20" fill="#0a1628"/>
      <path d="M0 10 Q5 8 10 10 Q15 12 20 10" stroke="#0f2040" stroke-width="0.5" fill="none" opacity="0.6"/>
      <path d="M0 15 Q5 13 10 15 Q15 17 20 15" stroke="#0f2040" stroke-width="0.3" fill="none" opacity="0.4"/>
    </pattern>
    <!-- Park pattern -->
    <pattern id="parkPattern" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
      <rect width="16" height="16" fill="#0d1f15"/>
      <circle cx="4" cy="4" r="1.5" fill="#132a1c" opacity="0.7"/>
      <circle cx="12" cy="12" r="1.5" fill="#132a1c" opacity="0.7"/>
      <circle cx="12" cy="4" r="1" fill="#0f2318" opacity="0.5"/>
      <circle cx="4" cy="12" r="1" fill="#0f2318" opacity="0.5"/>
    </pattern>
    <!-- Grid pattern for industrial area -->
    <pattern id="industrialPattern" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <rect width="24" height="24" fill="#141a22"/>
      <rect x="0" y="0" width="24" height="24" fill="none" stroke="#1a2233" stroke-width="0.3"/>
      <rect x="6" y="6" width="12" height="12" fill="none" stroke="#1a2233" stroke-width="0.2"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1600" height="1000" fill="#0c1220"/>

  <!-- ===== WATER BODY (river along bottom-right) ===== -->
  <path d="M1100 0 Q1150 100 1200 200 Q1280 350 1250 500 Q1220 650 1300 800 Q1350 900 1400 1000 L1600 1000 L1600 0 Z"
        fill="url(#waterPattern)" opacity="0.9"/>
  <path d="M1100 0 Q1150 100 1200 200 Q1280 350 1250 500 Q1220 650 1300 800 Q1350 900 1400 1000"
        stroke="#1a3050" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- River label -->
  <text x="1350" y="450" fill="#1a3a5a" font-family="Arial, sans-serif" font-size="18"
        font-style="italic" letter-spacing="6" transform="rotate(72 1350 450)" opacity="0.6">RIVER KNOX</text>

  <!-- ===== DISTRICTS / ZONES ===== -->

  <!-- Industrial District (top-left) -->
  <rect x="20" y="20" width="480" height="380" rx="4" fill="url(#industrialPattern)" opacity="0.8"/>
  <rect x="20" y="20" width="480" height="380" rx="4" fill="none" stroke="#1e2a3a" stroke-width="1" stroke-dasharray="8 4" opacity="0.4"/>

  <!-- Park / Green area (center-left) -->
  <path d="M60 520 Q80 470 160 480 Q240 460 300 490 Q340 500 360 530 Q380 570 360 610 Q330 650 280 660 Q200 670 130 650 Q70 630 60 580 Z"
        fill="url(#parkPattern)" opacity="0.9"/>
  <path d="M60 520 Q80 470 160 480 Q240 460 300 490 Q340 500 360 530 Q380 570 360 610 Q330 650 280 660 Q200 670 130 650 Q70 630 60 580 Z"
        fill="none" stroke="#1a3a25" stroke-width="1.5" opacity="0.5"/>

  <!-- Downtown area blocks -->
  <!-- Block row 1 -->
  <rect x="560" y="80" width="120" height="90" rx="3" fill="#111927" stroke="#1c2840" stroke-width="0.8"/>
  <rect x="700" y="80" width="160" height="90" rx="3" fill="#12192a" stroke="#1c2840" stroke-width="0.8"/>
  <rect x="880" y="80" width="100" height="90" rx="3" fill="#111927" stroke="#1c2840" stroke-width="0.8"/>

  <!-- Block row 2 -->
  <rect x="560" y="200" width="180" height="110" rx="3" fill="#12192a" stroke="#1c2840" stroke-width="0.8"/>
  <rect x="760" y="200" width="100" height="110" rx="3" fill="#111826" stroke="#1c2840" stroke-width="0.8"/>
  <rect x="880" y="200" width="140" height="110" rx="3" fill="#121a2b" stroke="#1c2840" stroke-width="0.8"/>

  <!-- Block row 3 -->
  <rect x="560" y="340" width="140" height="100" rx="3" fill="#111927" stroke="#1c2840" stroke-width="0.8"/>
  <rect x="720" y="340" width="130" height="100" rx="3" fill="#12192a" stroke="#1c2840" stroke-width="0.8"/>
  <rect x="870" y="340" width="160" height="100" rx="3" fill="#111826" stroke="#1c2840" stroke-width="0.8"/>

  <!-- Residential blocks (bottom center) -->
  <rect x="440" y="580" width="100" height="80" rx="2" fill="#111825" stroke="#1c2840" stroke-width="0.6"/>
  <rect x="560" y="580" width="100" height="80" rx="2" fill="#101724" stroke="#1c2840" stroke-width="0.6"/>
  <rect x="680" y="580" width="100" height="80" rx="2" fill="#111825" stroke="#1c2840" stroke-width="0.6"/>
  <rect x="440" y="690" width="100" height="80" rx="2" fill="#101724" stroke="#1c2840" stroke-width="0.6"/>
  <rect x="560" y="690" width="100" height="80" rx="2" fill="#111825" stroke="#1c2840" stroke-width="0.6"/>
  <rect x="680" y="690" width="100" height="80" rx="2" fill="#101724" stroke="#1c2840" stroke-width="0.6"/>

  <!-- Miller's Hill area (right side, elevated feel) -->
  <ellipse cx="1020" cy="280" rx="140" ry="120" fill="#0f1725" opacity="0.8"/>
  <ellipse cx="1020" cy="280" rx="140" ry="120" fill="none" stroke="#1a2a3f" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>
  <!-- Contour lines for the hill -->
  <ellipse cx="1020" cy="280" rx="100" ry="85" fill="none" stroke="#151f30" stroke-width="0.6" opacity="0.5"/>
  <ellipse cx="1020" cy="280" rx="65" ry="55" fill="none" stroke="#151f30" stroke-width="0.6" opacity="0.4"/>

  <!-- Old Municipal area (bottom right) -->
  <rect x="900" y="560" width="280" height="200" rx="6" fill="#10182a" stroke="#1c2840" stroke-width="1" stroke-dasharray="6 3" opacity="0.6"/>

  <!-- ===== INDUSTRIAL BUILDINGS ===== -->
  <!-- Warehouses -->
  <rect x="60" y="60" width="120" height="70" rx="2" fill="#161e2c" stroke="#263044" stroke-width="1"/>
  <rect x="200" y="50" width="90" height="80" rx="2" fill="#151d2a" stroke="#263044" stroke-width="1"/>
  <rect x="310" y="60" width="140" height="65" rx="2" fill="#161e2c" stroke="#263044" stroke-width="1"/>
  <rect x="60" y="170" width="100" height="60" rx="2" fill="#151d2a" stroke="#263044" stroke-width="1"/>
  <rect x="180" y="180" width="130" height="50" rx="2" fill="#161e2c" stroke="#263044" stroke-width="1"/>
  <rect x="340" y="165" width="110" height="70" rx="2" fill="#151d2a" stroke="#263044" stroke-width="1"/>
  <!-- Smokestacks -->
  <rect x="85" y="40" width="8" height="20" fill="#1a2435"/>
  <rect x="130" y="35" width="8" height="25" fill="#1a2435"/>
  <rect x="350" y="40" width="8" height="20" fill="#1a2435"/>

  <!-- Large warehouse (Site Alpha location) -->
  <rect x="60" y="280" width="180" height="100" rx="3" fill="#1a2236" stroke="#2a3a54" stroke-width="1.5"/>
  <line x1="60" y1="330" x2="240" y2="330" stroke="#222e42" stroke-width="0.8"/>
  <rect x="140" y="350" width="40" height="30" rx="1" fill="none" stroke="#2a3a54" stroke-width="0.8"/>

  <!-- ===== MAJOR STREETS ===== -->
  <g filter="url(#streetGlow)">
    <!-- Main horizontal arteries -->
    <line x1="0" y1="440" x2="1100" y2="440" stroke="#2a3e5a" stroke-width="4" opacity="0.8"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke="#2a3e5a" stroke-width="3" opacity="0.6"/>
    <line x1="0" y1="180" x2="520" y2="180" stroke="#243650" stroke-width="3" opacity="0.6"/>
    <line x1="400" y1="800" x2="1250" y2="800" stroke="#2a3e5a" stroke-width="3" opacity="0.6"/>

    <!-- Main vertical arteries -->
    <line x1="520" y1="0" x2="520" y2="1000" stroke="#2a3e5a" stroke-width="4" opacity="0.8"/>
    <line x1="1060" y1="0" x2="1060" y2="460" stroke="#243650" stroke-width="3" opacity="0.6"/>
    <line x1="1060" y1="460" x2="1120" y2="600" stroke="#243650" stroke-width="2.5" opacity="0.5"/>
    <line x1="1120" y1="600" x2="1200" y2="1000" stroke="#243650" stroke-width="2.5" opacity="0.5"/>

    <!-- Secondary streets (downtown grid) -->
    <line x1="520" y1="180" x2="1060" y2="180" stroke="#223350" stroke-width="2.5" opacity="0.5"/>
    <line x1="520" y1="320" x2="1060" y2="320" stroke="#223350" stroke-width="2.5" opacity="0.5"/>
    <line x1="680" y1="80" x2="680" y2="440" stroke="#223350" stroke-width="2" opacity="0.45"/>
    <line x1="860" y1="80" x2="860" y2="440" stroke="#223350" stroke-width="2" opacity="0.45"/>

    <!-- Residential streets -->
    <line x1="420" y1="540" x2="420" y2="900" stroke="#1e3048" stroke-width="2" opacity="0.4"/>
    <line x1="550" y1="540" x2="550" y2="900" stroke="#1e3048" stroke-width="2" opacity="0.4"/>
    <line x1="670" y1="540" x2="670" y2="900" stroke="#1e3048" stroke-width="2" opacity="0.4"/>
    <line x1="790" y1="540" x2="790" y2="900" stroke="#1e3048" stroke-width="2" opacity="0.4"/>
    <line x1="420" y1="670" x2="790" y2="670" stroke="#1e3048" stroke-width="2" opacity="0.4"/>
    <line x1="420" y1="780" x2="790" y2="780" stroke="#1e3048" stroke-width="2" opacity="0.4"/>

    <!-- Industrial roads -->
    <line x1="50" y1="150" x2="460" y2="150" stroke="#1e3048" stroke-width="2" opacity="0.4"/>
    <line x1="50" y1="260" x2="460" y2="260" stroke="#1e3048" stroke-width="2" opacity="0.4"/>
    <line x1="170" y1="30" x2="170" y2="400" stroke="#1e3048" stroke-width="2" opacity="0.4"/>
    <line x1="300" y1="30" x2="300" y2="400" stroke="#1e3048" stroke-width="2" opacity="0.4"/>

    <!-- Diagonal road to Miller's Hill -->
    <path d="M860 320 Q920 280 960 260 Q1000 245 1060 180" stroke="#223350" stroke-width="2" fill="none" opacity="0.45"/>

    <!-- Bridge over river -->
    <line x1="1060" y1="440" x2="1300" y2="440" stroke="#2a3e5a" stroke-width="3.5" opacity="0.7"/>
    <rect x="1160" y="432" width="40" height="16" rx="2" fill="none" stroke="#3a506a" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- ===== LANDMARK BUILDINGS ===== -->

  <!-- Downtown tall buildings -->
  <g opacity="0.7">
    <rect x="590" y="100" width="25" height="50" fill="#1a2540" stroke="#2a3a5a" stroke-width="0.8"/>
    <rect x="625" y="90" width="20" height="60" fill="#1c2844" stroke="#2a3a5a" stroke-width="0.8"/>
    <rect x="720" y="95" width="30" height="55" fill="#1a2540" stroke="#2a3a5a" stroke-width="0.8"/>
    <rect x="770" y="105" width="22" height="45" fill="#1c2844" stroke="#2a3a5a" stroke-width="0.8"/>
    <rect x="900" y="100" width="28" height="50" fill="#1a2540" stroke="#2a3a5a" stroke-width="0.8"/>
  </g>

  <!-- City Hall (downtown) -->
  <rect x="620" y="220" width="80" height="60" rx="3" fill="#182440" stroke="#2e4468" stroke-width="1.5"/>
  <rect x="640" y="210" width="40" height="10" fill="#1e2e4a"/>
  <polygon points="660,200 680,210 640,210" fill="#1e2e4a"/>

  <!-- Radio Tower on Miller's Hill -->
  <g transform="translate(1020, 230)">
    <line x1="0" y1="0" x2="0" y2="-60" stroke="#3a5070" stroke-width="2"/>
    <line x1="-15" y1="0" x2="0" y2="-40" stroke="#2a4060" stroke-width="1.2"/>
    <line x1="15" y1="0" x2="0" y2="-40" stroke="#2a4060" stroke-width="1.2"/>
    <line x1="-10" y1="-10" x2="10" y2="-10" stroke="#2a4060" stroke-width="0.8"/>
    <line x1="-7" y1="-25" x2="7" y2="-25" stroke="#2a4060" stroke-width="0.8"/>
    <!-- Blinking light -->
    <circle cx="0" cy="-60" r="3" fill="#ff3344" opacity="0.8"/>
    <circle cx="0" cy="-60" r="6" fill="#ff3344" opacity="0.2"/>
  </g>

  <!-- Municipal Building (old, above bunker) -->
  <rect x="960" y="600" width="120" height="80" rx="4" fill="#151e30" stroke="#283a55" stroke-width="1.5"/>
  <rect x="970" y="610" width="30" height="25" fill="none" stroke="#1e2e44" stroke-width="0.8"/>
  <rect x="1010" y="610" width="30" height="25" fill="none" stroke="#1e2e44" stroke-width="0.8"/>
  <rect x="1050" y="610" width="20" height="25" fill="none" stroke="#1e2e44" stroke-width="0.8"/>
  <rect x="990" y="648" width="40" height="32" fill="none" stroke="#1e2e44" stroke-width="0.8"/>

  <!-- ===== DISTRICT LABELS ===== -->
  <text x="250" y="420" fill="#3a5a7a" font-family="'Courier New', monospace" font-size="16"
        font-weight="bold" letter-spacing="4" text-anchor="middle" opacity="0.6">INDUSTRIAL DISTRICT</text>

  <text x="770" y="65" fill="#4a6a8a" font-family="'Courier New', monospace" font-size="18"
        font-weight="bold" letter-spacing="5" text-anchor="middle" opacity="0.7">DOWNTOWN</text>

  <text x="1020" y="310" fill="#3a5a7a" font-family="'Courier New', monospace" font-size="14"
        font-weight="bold" letter-spacing="3" text-anchor="middle" opacity="0.6">MILLER'S HILL</text>

  <text x="210" y="560" fill="#1e4a32" font-family="'Courier New', monospace" font-size="12"
        font-weight="bold" letter-spacing="2" text-anchor="middle" opacity="0.6">RIVERSIDE PARK</text>

  <text x="600" y="570" fill="#3a5a7a" font-family="'Courier New', monospace" font-size="13"
        font-weight="bold" letter-spacing="3" text-anchor="middle" opacity="0.5">RESIDENTIAL QUARTER</text>

  <text x="1020" y="590" fill="#3a5a7a" font-family="'Courier New', monospace" font-size="12"
        font-weight="bold" letter-spacing="3" text-anchor="middle" opacity="0.5">OLD MUNICIPAL GROUNDS</text>

  <!-- ===== STREET LABELS ===== -->
  <text x="770" y="455" fill="#2a4a6a" font-family="Arial, sans-serif" font-size="10"
        letter-spacing="3" text-anchor="middle" opacity="0.5">MAIN STREET</text>

  <text x="508" y="700" fill="#2a4a6a" font-family="Arial, sans-serif" font-size="9"
        letter-spacing="2" text-anchor="middle" opacity="0.4" transform="rotate(-90 508 700)">HARBOR AVE</text>

  <text x="770" y="335" fill="#2a4a6a" font-family="Arial, sans-serif" font-size="9"
        letter-spacing="2" text-anchor="middle" opacity="0.4">COMMERCE BLVD</text>

  <text x="770" y="195" fill="#2a4a6a" font-family="Arial, sans-serif" font-size="9"
        letter-spacing="2" text-anchor="middle" opacity="0.4">NORTH AVENUE</text>

  <text x="1180" y="430" fill="#2a4a6a" font-family="Arial, sans-serif" font-size="9"
        letter-spacing="2" text-anchor="middle" opacity="0.4">KNOX BRIDGE</text>

  <!-- ===== MISC MAP DETAILS ===== -->

  <!-- Parking lots -->
  <rect x="480" y="460" width="30" height="30" fill="#0e1520" stroke="#1a2535" stroke-width="0.5"/>
  <text x="495" y="480" fill="#1a2a40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">P</text>

  <rect x="850" y="460" width="30" height="30" fill="#0e1520" stroke="#1a2535" stroke-width="0.5"/>
  <text x="865" y="480" fill="#1a2a40" font-family="Arial, sans-serif" font-size="8" text-anchor="middle">P</text>

  <!-- Train tracks along industrial area bottom -->
  <line x1="0" y1="410" x2="520" y2="410" stroke="#222a38" stroke-width="1.5" stroke-dasharray="12 4 2 4" opacity="0.5"/>

  <!-- Small dock/pier on river -->
  <line x1="1200" y1="200" x2="1240" y2="190" stroke="#1e3048" stroke-width="3" opacity="0.5"/>
  <line x1="1210" y1="230" x2="1250" y2="220" stroke="#1e3048" stroke-width="3" opacity="0.5"/>

  <!-- Compass rose (top-right area) -->
  <g transform="translate(1440, 80)" opacity="0.4">
    <circle cx="0" cy="0" r="30" fill="none" stroke="#3a5a7a" stroke-width="1"/>
    <polygon points="0,-25 4,-5 -4,-5" fill="#3a5a7a"/>
    <polygon points="0,25 4,5 -4,5" fill="#253a50"/>
    <polygon points="-25,0 -5,4 -5,-4" fill="#253a50"/>
    <polygon points="25,0 5,4 5,-4" fill="#253a50"/>
    <text x="0" y="-34" fill="#4a6a8a" font-family="Arial, sans-serif" font-size="12"
          font-weight="bold" text-anchor="middle">N</text>
  </g>

  <!-- Scale bar (bottom-left) -->
  <g transform="translate(40, 950)" opacity="0.4">
    <line x1="0" y1="0" x2="120" y2="0" stroke="#3a5a7a" stroke-width="1.5"/>
    <line x1="0" y1="-5" x2="0" y2="5" stroke="#3a5a7a" stroke-width="1"/>
    <line x1="60" y1="-3" x2="60" y2="3" stroke="#3a5a7a" stroke-width="0.8"/>
    <line x1="120" y1="-5" x2="120" y2="5" stroke="#3a5a7a" stroke-width="1"/>
    <text x="0" y="15" fill="#3a5a7a" font-family="Arial, sans-serif" font-size="9">0</text>
    <text x="56" y="15" fill="#3a5a7a" font-family="Arial, sans-serif" font-size="9">0.5</text>
    <text x="115" y="15" fill="#3a5a7a" font-family="Arial, sans-serif" font-size="9">1 km</text>
  </g>

  <!-- Map title / classification -->
  <text x="800" y="980" fill="#1e3048" font-family="'Courier New', monospace" font-size="10"
        letter-spacing="8" text-anchor="middle" opacity="0.35">CLASSIFIED // INTERNAL USE ONLY</text>

  <!-- Grid overlay (very subtle) -->
  <g opacity="0.06">
    <line x1="200" y1="0" x2="200" y2="1000" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="1000" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="1000" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="1000" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="1000" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="1200" y1="0" x2="1200" y2="1000" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="1400" y1="0" x2="1400" y2="1000" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1600" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1600" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="600" x2="1600" y2="600" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="800" x2="1600" y2="800" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Subtle vignette border -->
  <rect width="1600" height="1000" fill="none" stroke="#000000" stroke-width="40" opacity="0.3" rx="2"/>
  <rect width="1600" height="1000" fill="none" stroke="#1a2a40" stroke-width="1.5" rx="2" opacity="0.6"/>
</svg>