<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Tagebuch</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/themes.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="screen-login" class="screen active">
    <div class="login-card">
      <div class="login-icon">&#128274;</div>
      <h1 id="login-title">Secure Login</h1>
      <p id="login-subtitle">Enter your credentials to access the system</p>
      <form id="login-form" autocomplete="off">
        <div class="input-group">
          <label for="login-username">Username</label>
          <input type="text" id="login-username" autocomplete="off" spellcheck="false">
        </div>
        <div class="input-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" autocomplete="off">
        </div>
        <p id="login-error" class="error-message" hidden></p>
        <button type="submit" class="btn-primary">Öffnen</button>
      </form>
    </div>
  </div>

  <!-- Inbox Screen -->
  <div id="screen-inbox" class="screen">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="app-logo">&#128218;</div>
        <span class="app-name">Tagebuch</span>
      </div>
      <nav class="sidebar-nav">
        <a class="nav-item active" id="nav-inbox">
          <span class="nav-icon">&#128221;</span>
          Einträge
          <span class="nav-badge" id="unread-badge"></span>
        </a>
      </nav>
      <div class="sidebar-account">
        <div class="account-avatar" id="account-avatar"></div>
        <div class="account-info">
          <div class="account-name" id="account-name"></div>
          <div class="account-email" id="account-email"></div>
        </div>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="inbox-main">
      <!-- Email List View -->
      <div id="email-list-view" class="view active">
        <div class="inbox-header">
          <h2>Einträge</h2>
        </div>
        <div id="email-list" class="email-list"></div>
      </div>

      <!-- Email Detail View -->
      <div id="email-detail-view" class="view">
        <div class="detail-header">
          <button class="btn-back" id="btn-back">&#8592; Back</button>
        </div>
        <div id="email-detail-content" class="email-detail-content"></div>
      </div>
    </main>
  </div>

  <!-- Bottom Sheet Modal (for map markers) -->
  <div id="bottom-sheet-overlay" class="bottom-sheet-overlay">
    <div id="bottom-sheet" class="bottom-sheet">
      <div class="bottom-sheet-handle"></div>
      <div id="bottom-sheet-content" class="bottom-sheet-content"></div>
    </div>
  </div>

  <!-- Audio for notification -->
  <audio id="notification-sound" preload="auto" src="assets/notification.wav"></audio>

  <!-- Config (edit data/config.js to customize the game) -->
  <script src="data/config.js"></script>

  <!-- Scripts (order matters) -->
  <script src="js/app.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/login.js"></script>
  <script src="js/inbox.js"></script>
  <script src="js/map.js"></script>

</body>
</html>
